name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip build
          pip install .
      - name: Import check
        run: python -c "import tuya_mobile; from tuya_mobile.signer import PurePythonTuyaSigner; print('ok')"
      - name: Build dist
        run: python -m build
